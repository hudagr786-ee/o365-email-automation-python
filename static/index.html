<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Exchange Email Monitor

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Segoe UI,Arial,sans-serif;
background:#eef2f7;
padding:35px;
color:#222;

}

.container{

max-width:1200px;
margin:auto;

}

.header{

background:white;
border-radius:15px;
padding:25px;
margin-bottom:25px;
box-shadow:0 4px 15px rgba(0,0,0,.08);

}

.header h1{

color:#1565c0;
font-size:34px;

}

.subtitle{

margin-top:10px;
color:#666;

}

.status{

margin-top:15px;
font-size:15px;
color:#2e7d32;
font-weight:bold;

}

.stats{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;

}

.card{

background:white;
border-radius:12px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
text-align:center;

}

.card h2{

font-size:34px;
color:#1565c0;

}

.card p{

margin-top:8px;
font-weight:bold;
color:#555;

}

.search{

background:white;
padding:20px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.search input{

width:100%;
padding:14px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;

}

.email{

background:white;
border-radius:14px;
margin-bottom:22px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
overflow:hidden;

}

.email-header{

padding:20px;
cursor:pointer;

}

.subject{

font-size:22px;
font-weight:bold;
color:#1565c0;

}

.info{

margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:25px;
color:#555;

}

.badge{

display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-top:15px;

}

.reply{

background:#fff3cd;
color:#856404;

}

.original{

background:#d4edda;
color:#155724;

}

.details{

display:none;
padding:20px;
border-top:1px solid #eee;
background:#fafafa;

}

.message{

background:white;
padding:18px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
margin-bottom:20px;
border-left:5px solid #1565c0;

}

.attachments{

background:#eef7ff;
padding:15px;
border-radius:10px;

}

.attachments h3{

margin-bottom:15px;
color:#1565c0;

}

.file{

background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;

}

.file a{

text-decoration:none;
color:#1565c0;
font-weight:bold;

}

.toggle{

margin-top:15px;
color:#1565c0;
font-weight:bold;

}

.footer{

margin-top:40px;
text-align:center;
color:#777;
font-size:14px;

}

/* -----------------------------
   HTML Email Formatting
----------------------------- */

.email-html{

    background:white;

    padding:20px;

    border-left:5px solid #1565c0;

    border-radius:10px;

    overflow:auto;

    line-height:1.6;

}

.email-html table{

    border-collapse:collapse;

    width:100%;

}

.email-html table,
.email-html th,
.email-html td{

    border:1px solid #999;

}

.email-html th,
.email-html td{

    padding:8px;

}

.email-html img{

    max-width:100%;

}

.email-html ul,
.email-html ol{

    margin-left:25px;

}

@media(max-width:900px){

.stats{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:600px){

.stats{

grid-template-columns:1fr;

}

.info{

flex-direction:column;
gap:8px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

📧 Exchange Email Monitor

</h1>

<p class="subtitle">

Microsoft Exchange Email Dashboard

</p>

<p class="status">

🟢 Exchange Server Connected

</p>

</div>

<div class="stats">

<div class="card">

<h2 id="totalEmails">

0

</h2>

<p>Total Emails</p>

</div>

<div class="card">

<h2 id="replyCount">

0

</h2>

<p>Replies</p>

</div>

<div class="card">

<h2 id="attachmentCount">

0

</h2>

<p>Attachments</p>

</div>

<div class="card">

<h2 id="lastUpdated">

--

</h2>

<p>Last Updated</p>

</div>

</div>

<div class="search">

<input

type="text"

id="search"

placeholder="🔍 Search by subject or sender..."

>

</div>

<div id="emailContainer">

Loading emails...

</div>

<div class="footer">

Exchange Email Monitor • FastAPI • Python • Exchange Web Services

</div>
    <script>

let allEmails = [];

async function loadEmails(){

    try{

        const response = await fetch("/dashboard");

        const data = await response.json();

        allEmails = data.emails;

        updateStatistics(allEmails);

        renderEmails(allEmails);

    }

    catch(error){

        document.getElementById("emailContainer").innerHTML = `
            <div class="email">
                <div class="email-header">
                    <h2 style="color:red;">
                        Unable to load emails.
                    </h2>
                    <p>Please check your FastAPI server.</p>
                </div>
            </div>
        `;

        console.error(error);

    }

}



function updateStatistics(emails){

    document.getElementById("totalEmails").innerText = emails.length;

    let replies = 0;

    let attachments = 0;

    emails.forEach(email=>{

        if(email.is_reply){

            replies++;

        }

        attachments += email.attachments.length;

    });

    document.getElementById("replyCount").innerText = replies;

    document.getElementById("attachmentCount").innerText = attachments;

    const now = new Date();

    document.getElementById("lastUpdated").innerText =
        now.toLocaleTimeString();

}



function renderEmails(emails){

    let html = "";

    emails.forEach((email, index) => {

        let badge = email.is_reply

            ?

            `<span class="badge reply">↩ Reply</span>`

            :

            `<span class="badge original">📨 Original Email</span>`;


        // Build attachment section only if attachments exist
        let attachmentsSection = "";

        if(email.attachments.length > 0){

            let attachmentsHTML = "";

            email.attachments.forEach(file => {

                attachmentsHTML += `

                <div class="file">

                    <div>

                        📄 ${file.name}

                        <br>

                        <small>

                            ${Math.round(file.size / 1024)} KB

                        </small>

                    </div>

                    <div>

                        <a href="${file.url}" target="_blank">

                            Download

                        </a>

                    </div>

                </div>

                `;

            });

            attachmentsSection = `

                <div class="attachments">

                    <h3>

                        📎 Attachments

                    </h3>

                    ${attachmentsHTML}

                </div>

            `;

        }


        html += `

        <div class="email">

            <div

                class="email-header"

                onclick="toggle(${index})">

                <div class="subject">

                    ${email.subject}

                </div>

                ${badge}

                <div class="info">

                    <div>

                        👤 ${email.sender}

                    </div>

                    <div>

                        🕒 ${email.received}

                    </div>

                </div>

                <div class="toggle">

                    ▼ Click to View Details

                </div>

            </div>

            <div

                class="details"

                id="details${index}">

                <div class="message email-html">

    ${email.body_html || "<i>No Message</i>"}

</div>

                ${attachmentsSection}

            </div>

        </div>

        `;

    });

    document.getElementById("emailContainer").innerHTML = html;

}




function toggle(index){

    const element =

    document.getElementById(

        "details"+index

    );

    if(element.style.display==="block"){

        element.style.display="none";

    }

    else{

        element.style.display="block";

    }

}



document

.getElementById("search")

.addEventListener(

"keyup",

function(){

    const keyword =

    this.value.toLowerCase();

    const filtered =

    allEmails.filter(email=>

        email.subject.toLowerCase().includes(keyword)

        ||

        email.sender.toLowerCase().includes(keyword)

    );

    renderEmails(filtered);

});



loadEmails();



</script>

</div>

</body>

</html>
